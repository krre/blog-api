info:
  name: Update password
  type: http
  seq: 3

http:
  method: PATCH
  url: "{{host}}/profile/password"
  body:
    type: json
    data: |-
      {
        "password": "{{process.env.password}}"
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
